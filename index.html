<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Key Register — Dusit Thani Security</title>

  <!-- Excel Reader -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: sans-serif; background:#f7f3ea; }
    #login-screen { position: fixed; inset:0; display:flex; justify-content:center; align-items:center; }
    .login-box { background:#fff; padding:20px; border:1px solid #000; }
    #app { display:none; padding:20px; }
    table { width:100%; border-collapse: collapse; }
    th, td { border:1px solid #ccc; padding:8px; }
    th { background:#eee; }
    .status-btns button { margin-right:5px; }
    .active { background:green; color:#fff; }
    .err.active { background:red; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Login</h2>
    <input type="password" id="pw" placeholder="Password">
    <button onclick="login()">เข้า</button>
  </div>
</div>

<div id="app">
  <h2>Key List</h2>

  <input type="text" id="search" placeholder="ค้นหา..." oninput="render()">

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>ชั้น</th>
        <th>ชื่อกุญแจ</th>
        <th>ตู้</th>
        <th>สถานะ</th>
        <th>หมายเหตุ</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const KEY_DB = 'dusit_key_v5';
let keys = [];

// ✅ โหลด Excel จริง
async function loadRawData() {
  const res = await fetch('All Key List.xlsx'); // ไฟล์ต้องอยู่ path เดียวกัน
  const data = await res.arrayBuffer();
  const workbook = XLSX.read(data);

  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  let result = [];
  let no = 1;

  json.forEach(row => {
    let borrower = (row["ผู้เบิก"] || "").toString().trim();

    // ❌ ตัด Ving card
    if (!borrower || borrower.toLowerCase().includes("ving card")) return;

    let fl = row["ชั้น"] || "-";

    let cab = 1;
    if (no <= 160) cab = 1;
    else if (no <= 320) cab = 2;
    else cab = 3;

    result.push({
      no: no++,
      fl: fl,
      name: borrower, // ⭐ ใช้ผู้เบิกเป็นชื่อกุญแจ
      cab: cab,
      status: 0,
      note: ""
    });
  });

  return result;
}

function login() {
  if(document.getElementById('pw').value === 'admin') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    alert('รหัสผ่านผิด');
  }
}

// ✅ ต้อง async
async function init() {
  const saved = localStorage.getItem(KEY_DB);
  keys = saved ? JSON.parse(saved) : await loadRawData();
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const tbody = document.getElementById('tbody');

  const filtered = keys.filter(k =>
    k.name.toLowerCase().includes(q) ||
    k.fl.toLowerCase().includes(q)
  );

  tbody.innerHTML = filtered.map(k => `
    <tr>
      <td>${k.no}</td>
      <td>${k.fl}</td>
      <td><b>${k.name}</b></td>
      <td>ตู้ ${k.cab}</td>
      <td>
        <div class="status-btns">
          <button class="${k.status===1?'active':''}" onclick="setStatus(${k.no},1)">OK</button>
          <button class="err ${k.status===2?'active':''}" onclick="setStatus(${k.no},2)">X</button>
        </div>
      </td>
      <td>
        <input value="${k.note}" onchange="setNote(${k.no}, this.value)">
      </td>
    </tr>
  `).join('');
}

function setStatus(no, s) {
  const i = keys.findIndex(x => x.no === no);
  keys[i].status = keys[i].status === s ? 0 : s;
  save(); render();
}

function setNote(no, txt) {
  const i = keys.findIndex(x => x.no === no);
  keys[i].note = txt;
  save();
}

function save() {
  localStorage.setItem(KEY_DB, JSON.stringify(keys));
}
</script>

</body>
</html>
