<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเช็คกุญแจ — Key Audit 2023</title>
<style>
  :root{
    --paper:#f4f5f7; --card:#ffffff; --ink:#1b1f27; --muted:#727c8a;
    --line:#e3e6eb; --brass:#a9781f; --brass-soft:#f3ead4;
    --ok:#1f8a4c; --ok-soft:#e4f4ea; --bad:#d23b3b; --bad-soft:#fbe7e7;
    --none:#aab2bd; --none-soft:#eef0f3;
    --shadow:0 1px 2px rgba(20,25,35,.06),0 4px 14px rgba(20,25,35,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:'Noto Sans Thai','IBM Plex Sans Thai',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    line-height:1.45;padding-bottom:90px}
  .mono{font-family:ui-monospace,'SF Mono','Roboto Mono',Menlo,monospace}

  /* ---- header ---- */
  header{background:linear-gradient(180deg,#23262e,#181b21);color:#fff;padding:18px 16px 14px}
  .wrap{max-width:760px;margin:0 auto}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);
    font-weight:700}
  h1{margin:2px 0 1px;font-size:21px;font-weight:800;letter-spacing:-.01em}
  .sub{font-size:12.5px;color:#aeb6c2}

  /* ---- stat bar ---- */
  .stats{position:sticky;top:0;z-index:30;background:rgba(244,245,247,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .statgrid{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);
    gap:1px;background:var(--line)}
  .stat{background:var(--paper);padding:10px 6px 8px;text-align:center}
  .stat .n{font-size:23px;font-weight:800;line-height:1;letter-spacing:-.02em}
  .stat .l{font-size:10.5px;color:var(--muted);margin-top:4px;font-weight:600}
  .stat.ok .n{color:var(--ok)} .stat.bad .n{color:var(--bad)} .stat.none .n{color:var(--none)}
  .bar{max-width:760px;margin:0 auto;height:5px;display:flex;background:var(--none-soft)}
  .bar i{display:block;height:100%}
  .bar .b-ok{background:var(--ok)} .bar .b-bad{background:var(--bad)}

  /* ---- controls ---- */
  .controls{max-width:760px;margin:0 auto;padding:13px 16px 4px}
  .search{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;
    font-size:15px;background:var(--card);font-family:inherit;box-shadow:var(--shadow)}
  .search:focus{outline:2px solid var(--brass);border-color:transparent}
  .pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  .pill{border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:7px 12px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;
    font-family:inherit;display:flex;align-items:center;gap:6px}
  .pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pill .c{font-size:11px;opacity:.7}
  .pill.on .c{opacity:.85}
  .pillrow-label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);font-weight:700;margin:14px 0 0}

  /* ---- list ---- */
  .list{max-width:760px;margin:0 auto;padding:10px 16px 0}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}
  .row{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--line);
    border-radius:13px;margin-bottom:9px;overflow:hidden;box-shadow:var(--shadow)}
  .rail{width:6px;flex:0 0 6px;background:var(--none)}
  .row[data-s="ok"] .rail{background:var(--ok)}
  .row[data-s="bad"] .rail{background:var(--bad)}
  .body{flex:1;padding:11px 12px 11px 13px;min-width:0}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px}
  .tag{font-size:12px;font-weight:700;color:var(--brass);background:var(--brass-soft);
    padding:2px 8px;border-radius:6px}
  .chip{font-size:11px;color:var(--muted);background:var(--none-soft);padding:2px 7px;border-radius:6px}
  .qty{font-size:11px;color:var(--muted)}
  .desc{font-size:15px;font-weight:600;word-break:break-word}
  .acts{display:flex;flex-direction:column;gap:6px;padding:10px;flex:0 0 auto;
    justify-content:center;background:#fafbfc;border-left:1px solid var(--line)}
  .btn{border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 10px;
    font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;
    min-width:74px;color:var(--muted);transition:.12s}
  .btn.ok.on{background:var(--ok);border-color:var(--ok);color:#fff}
  .btn.bad.on{background:var(--bad);border-color:var(--bad);color:#fff}
  .btn:active{transform:scale(.96)}

  /* ---- footer ---- */
  .foot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 16px;z-index:40}
  .footwrap{max-width:760px;margin:0 auto;display:flex;gap:9px}
  .fbtn{flex:1;padding:12px;border-radius:11px;border:1px solid var(--line);background:#fff;
    font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink)}
  .fbtn.primary{background:var(--brass);border-color:var(--brass);color:#fff}
  .save-dot{position:fixed;top:8px;right:10px;z-index:60;font-size:11px;color:var(--muted);
    opacity:0;transition:.3s;background:var(--card);padding:3px 9px;border-radius:999px;
    box-shadow:var(--shadow)}
  .save-dot.show{opacity:1}
  @media(max-width:430px){.acts{flex-direction:column}.btn{min-width:66px}}
</style>
</head>

<div class="save-dot" id="saveDot">บันทึกแล้ว ✓</div>
<header>
  <div class="wrap">
    <div class="eyebrow">Key Audit · 2023</div>
    <h1>ระบบเช็คกุญแจ</h1>
    <div class="sub">เลือก <b style="color:#fff">ใช้ได้</b> หรือ <b style="color:#fff">ใช้ไม่ได้</b> ทีละดอก ระบบจะนับให้อัตโนมัติและจำผลไว้ให้</div>
  </div>
</header>

<div class="stats">
  <div class="statgrid">
    <div class="stat"><div class="n" id="s-total">0</div><div class="l">ทั้งหมด</div></div>
    <div class="stat ok"><div class="n" id="s-ok">0</div><div class="l">ใช้ได้</div></div>
    <div class="stat bad"><div class="n" id="s-bad">0</div><div class="l">ใช้ไม่ได้</div></div>
    <div class="stat none"><div class="n" id="s-none">0</div><div class="l">ยังไม่เช็ค</div></div>
  </div>
  <div class="bar"><i class="b-ok" id="bar-ok"></i><i class="b-bad" id="bar-bad"></i></div>
</div>

<div class="controls">
  <input class="search" id="search" placeholder="ค้นหา… (ชื่อ, แผนก, ชั้น, หมายเลข)">
  <div class="pillrow-label">หมวดกุญแจ</div>
  <div class="pills" id="secPills"></div>
  <div class="pillrow-label">สถานะ</div>
  <div class="pills" id="statPills"></div>
</div>

<div class="list" id="list"></div>

<div class="foot"><div class="footwrap">
  <button class="fbtn" id="exportBtn">ดาวน์โหลดผล (CSV)</button>
  <button class="fbtn" id="resetBtn">ล้างผลทั้งหมด</button>
</div></div>

  saveTimer=setTimeout(async()=>{
    try{ await window.storage.set(STORE_KEY, JSON.stringify(status), false);
      const d=document.getElementById('saveDot'); d.classList.add('show');
      setTimeout(()=>d.classList.remove('show'),1100);
    }catch(e){}
  },350);
}

/* ---------- counts ---------- */
function counts(){
  let ok=0,bad=0;
  for(const k of KEYS){ if(status[k.id]==='ok')ok++; else if(status[k.id]==='bad')bad++; }
  return {total:KEYS.length, ok, bad, none:KEYS.length-ok-bad};
}
function secCount(sec){
  return KEYS.filter(k=>sec==='all'||k.sec_th===sec).length;
}
function renderStats(){
  const c=counts();
  s_total.textContent=c.total; s_ok.textContent=c.ok;
  s_bad.textContent=c.bad; s_none.textContent=c.none;
  document.getElementById('bar-ok').style.width=(c.ok/c.total*100)+'%';
  document.getElementById('bar-bad').style.width=(c.bad/c.total*100)+'%';
}

/* ---------- filters ---------- */
function secList(){
  const seen=[]; for(const k of KEYS) if(!seen.includes(k.sec_th)) seen.push(k.sec_th);
  return seen;
}
function buildPills(){
  const sp=document.getElementById('secPills');
  const mk=(label,val,cur,cnt)=>`<button class="pill ${val===cur?'on':''}" data-v="${val}">${label}<span class="c">${cnt}</span></button>`;
  let h=mk('ทั้งหมด','all',fSec,KEYS.length);
  for(const s of secList()) h+=mk(s,s,fSec,secCount(s));
  sp.innerHTML=h;
  sp.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{fSec=p.dataset.v;buildPills();renderList()});

  const stp=document.getElementById('statPills');
  const c=counts();
  stp.innerHTML=
    mk('ทั้งหมด','all',fStat,c.total)+
    mk('ใช้ได้','ok',fStat,c.ok)+
    mk('ใช้ไม่ได้','bad',fStat,c.bad)+
    mk('ยังไม่เช็ค','none',fStat,c.none);
  stp.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{fStat=p.dataset.v;buildPills();renderList()});
}

/* ---------- list ---------- */
function visible(){
  return KEYS.filter(k=>{
    if(fSec!=='all'&&k.sec_th!==fSec)return false;
    const st=status[k.id]||'none';
    if(fStat!=='all'&&st!==fStat)return false;
    if(q){ const hay=(k.no+' '+k.dept+' '+k.desc+' '+k.sec_th).toLowerCase();
      if(!hay.includes(q))return false; }
    return true;
  });
}
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function renderList(){
  const rows=visible();
  const el=document.getElementById('list');
  if(!rows.length){ el.innerHTML='<div class="empty">ไม่พบกุญแจที่ตรงกับการค้นหา</div>'; return; }
  el.innerHTML=rows.map(k=>{
    const st=status[k.id]||'none';
    const qty=k.qty>1?`<span class="qty">×${k.qty} ดอก</span>`:'';
    const dept=k.dept?`<span class="chip">${esc(k.dept)}</span>`:'';
    return `<div class="row" data-s="${st}">
      <div class="rail"></div>
      <div class="body">
        <div class="meta"><span class="tag mono">#${esc(k.no)}</span>
          <span class="chip">${esc(k.sec_th)}</span>${dept}${qty}</div>
        <div class="desc">${esc(k.desc)}</div>
      </div>
      <div class="acts">
        <button class="btn ok ${st==='ok'?'on':''}" data-id="${k.id}" data-set="ok">ใช้ได้</button>
        <button class="btn bad ${st==='bad'?'on':''}" data-id="${k.id}" data-set="bad">ใช้ไม่ได้</button>
      </div></div>`;
  }).join('');
  el.querySelectorAll('.btn').forEach(b=>b.onclick=()=>{
    const id=+b.dataset.id, set=b.dataset.set;
    if(status[id]===set) delete status[id]; else status[id]=set;
    save(); renderStats(); buildPills();
    if(fStat!=='all') renderList();
    else{ const row=b.closest('.row'); const ns=status[id]||'none';
      row.dataset.s=ns;
      row.querySelectorAll('.btn').forEach(x=>x.classList.toggle('on',x.dataset.set===ns)); }
  });
}

/* ---------- export ---------- */
function exportCSV(){
  const lbl={ok:'ใช้ได้',bad:'ใช้ไม่ได้'};
  let csv='\uFEFFNo,หมวด,แผนก/ชั้น,จำนวน,รายละเอียด,สถานะ\n';
  for(const k of KEYS){
    const st=lbl[status[k.id]]||'ยังไม่เช็ค';
    const cell=v=>`"${(v+'').replace(/"/g,'""')}"`;
    csv+=[k.no,k.sec_th,k.dept,k.qty,k.desc,st].map(cell).join(',')+'\n';
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='ผลเช็คกุญแจ.csv'; a.click();
}

document.getElementById('search').oninput=e=>{q=e.target.value.toLowerCase().trim();renderList()};
document.getElementById('exportBtn').onclick=exportCSV;
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('ล้างผลการเช็คทั้งหมด? การกระทำนี้ย้อนกลับไม่ได้')){
    status={}; save(); renderStats(); buildPills(); renderList(); }
};

(async function init(){
  await load();
  renderStats(); buildPills(); renderList();
})();
</script>
